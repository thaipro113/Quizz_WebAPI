name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  backend-test:
    name: Backend Test (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: quizz
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        env:
          DB_NAME: quizz
          DB_USER: postgres
          DB_PASSWORD: 12345
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          cd quizz_backend
          python manage.py test

  frontend-build:
    name: Frontend Build (Vite/React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quizz_frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd quizz_frontend
          npm ci

      - name: Build frontend
        run: |
          cd quizz_frontend
          npm run build
